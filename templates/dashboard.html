<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AsistTrack - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>

<div class="layout">
<aside class="sidebar">
    <div class="sidebar-brand">AsistTrack</div>
    <nav class="sidebar-nav">
        <a href="/" class="nav-link">🏠 Inicio</a>
        <a href="/asistencia" class="nav-link">📋 Asistencia</a>
        <a href="/empleados" class="nav-link">👥 Empleados</a>
        <a href="/reporte_pago" class="nav-link">💰 Pago Quincenal</a>
    </nav>
    <a href="/logout" class="sidebar-logout">🚪 Cerrar Sesión</a>
</aside>
<main class="main-content">

    <div class="container">
        <h1>Panel Principal</h1>
        <h3>Bienvenido, Admin 👋</h3>
        <br>
        <div class="cards">
            <div class="card">
                <h2>👥 Total Empleados</h2>
                <p class="numero">{{ total_empleados }}</p>
            </div>
            <div class="card">
                <h2>✅ Presentes Hoy</h2>
                <p class="numero">{{ presentes_hoy }}</p>
            </div>
            <div class="card">
                <h2>❌ Ausentes Hoy</h2>
                <p class="numero">{{ ausentes_hoy }}</p>
            </div>
            <div class="card">
                <h2>💰 Total a Pagar</h2>
                <p class="numero">${{ total_pagar }}</p>
            </div>
        </div>
    </div>

</main>
</div>
</body>
</html>
