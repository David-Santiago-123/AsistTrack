{% extends 'base.html' %}

{% block content %}
    <div class="container">
        <h1>Panel Principal</h1>
        <h3>Bienvenido, Admin 👋</h3>
        <br>
        <div class="cards">
            <div class="card">
                <h2>👥 Total Empleados</h2>
                <p class="numero">{{ total_empleados }}</p>
            </div>
            <div class="card">
                <h2>✅ Presentes Hoy</h2>
                <p class="numero">{{ presentes_hoy }}</p>
            </div>
            <div class="card">
                <h2>❌ Ausentes Hoy</h2>
                <p class="numero">{{ ausentes_hoy }}</p>
            </div>
            <div class="card">
                <h2>💰 Total a Pagar</h2>
                <p class="numero">${{ total_pagar }}</p>
            </div>
        </div>
    </div>
{% endblock %}
