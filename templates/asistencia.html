{% extends 'base.html' %}

{% block content %}
    <div class="container">
        <h1>Registro de Asistencia</h1>
        <h3>Fecha: {{ fecha }}</h3>
        <a href="/empleados" class="btn">← Empleados</a>
        <br><br>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Cargo</th>
                        <th>Asistencia</th>
                    </tr>
                </thead>
                <tbody>
                    {% for empleado in empleados %}
                    <tr>
                        <td>{{ empleado[1] }}</td>
                        <td>{{ empleado[3] }}</td>
                        <td>
                            {% if empleado[0] in registrados_hoy %}
                                ✅ Registrado
                            {% else %}
                            <form method="POST" action="/guardar_asistencia/{{ empleado[0] }}">
                                <select name="estado">
                                    <option value="presente">Presente</option>
                                    <option value="ausente">Ausente</option>
                                    <option value="tarde">Tarde</option>
                                </select>
                                <button type="submit">Guardar</button>
                            </form>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
{% endblock %}
