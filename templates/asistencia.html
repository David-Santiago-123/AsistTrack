<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AsistTrack - Asistencia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>

    <nav>
     <a href="/">🏠 Inicio</a>
     <a href="/empleados">👥 Empleados</a>
     <a href="/asistencia">📋 Asistencia</a>
     <a href="/reporte">📊 Reporte Excel</a>
    </nav>

    <div class="container">
        <h1>Registro de Asistencia</h1>
        <h3>Fecha: {{ fecha }}</h3>
        <a href="/empleados" class="btn">← Empleados</a>
        <br><br>
        <form method="POST" action="/asistencia">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Cargo</th>
                        <th>Asistencia</th>
                    </tr>
                </thead>
                <tbody>
                    {% for empleado in empleados %}
                    <tr>
                        <td>{{ empleado[1] }}</td>
                        <td>{{ empleado[3] }}</td>
                        <td>
                            <select name="asistencia_{{ empleado[0] }}">
                                <option value="presente">✅ Presente</option>
                                <option value="ausente">❌ Ausente</option>
                            </select>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <br>
            <button type="submit">Guardar Asistencia</button>
        </form>
    </div>
</body>
</html>
