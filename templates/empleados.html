{% extends 'base.html' %}

{% block content %}
    <div class="container">
        <h1>Empleados</h1>
        <a href="/agregar_empleado" class="btn">+ Agregar Empleado</a>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Cedula</th>
                        <th>Cargo</th>
                        <th>Valor Dia</th>
                        <th>Emergencia</th>
                    </tr>
                </thead>
                <tbody>
                    {% for empleado in empleados %}
                    <tr>
                        <td>{{ empleado[1] }}</td>
                        <td>{{ empleado[2] }}</td>
                        <td>{{ empleado[3] }}</td>
                        <td>{{ empleado[4] }}</td>
                        <td>{{ empleado[5] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
{% endblock %}
