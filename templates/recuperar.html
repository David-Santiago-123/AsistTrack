<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsistTrack - Recuperar Contraseña</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body class="login-page">
<div class="login-container">
    <h1>Recuperar Contraseña</h1>
    <p class="subtitle">Ingresa tu correo y te enviaremos un enlace</p>
    {% if mensaje %}
    <p style="color: var(--success); margin-bottom: 15px; font-size: 14px;">{{ mensaje }}</p>
    {% endif %}
    <form method="POST">
        <label>Correo electrónico:</label>
        <input type="email" name="correo" placeholder="tucorreo@gmail.com" required>
        <button type="submit">Enviar enlace</button>
    </form>
    <a href="/login" style="display:block; text-align:center; margin-top:16px; font-size:13px; color:var(--muted);">← Volver al login</a>
</div>
</body>
</html>
